<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Hook Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,400;12..36,600;12..36,700;12..36,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
      }
      #root {
        position: relative; width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
      }
      #hook-wrap {
        position: absolute;
        top: 290px;
        left: 0;
        width: 1080px;
        display: flex;
        justify-content: center;
        padding: 0 70px;
      }
      #hook {
        text-align: center;
        font-family: 'TikTok Sans', sans-serif;
        font-weight: 800;
        font-size: 70px;
        line-height: 1.42;
        color: #000;
        /* the connected white rounded-pill look */
      }
      #hook .ln {
        display: inline;
        background: #ffffff;
        border-radius: 16px;
        padding: 0.06em 0.28em;
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;
      }
    </style>
  </head>
  <body>
    <div id="root"
      data-composition-id="hook-text"
      data-start="0"
      data-duration="3"
      data-width="1080"
      data-height="1920">

      <div id="hook-wrap" class="clip" data-start="0" data-duration="3" data-track-index="1">
        <div id="hook"><span class="ln">Avatar is in theaters</span><br><span class="ln">for 7 days and</span><br><span class="ln">nobody's invited</span></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      gsap.set("#hook-wrap", { opacity: 1 });
      // subtle pop-in
      tl.fromTo("#hook", { scale: 0.94 }, { scale: 1, duration: 0.25, ease: "back.out(1.8)" }, 0);
      tl.to("#hook-wrap", { opacity: 0, duration: 0.1 }, 2.9);
      window.__timelines["hook-text"] = tl;
      tl.seek(0);
    </script>
  </body>
</html>
