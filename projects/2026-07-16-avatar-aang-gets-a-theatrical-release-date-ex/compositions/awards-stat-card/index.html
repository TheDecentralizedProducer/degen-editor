<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Awards Stat Card</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
      }
      #root {
        position: relative; width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
      }
      #card-wrap {
        position: absolute;
        left: 30px;
        top: 280px;
        width: 480px;
      }
      #stat-card {
        background: rgba(0,0,0,0.85);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        padding: 28px 32px;
        border-left: 5px solid #eab308;
      }
      .stat-row {
        margin-bottom: 18px;
      }
      .stat-row:last-child { margin-bottom: 0; }
      .stat-number {
        font-family: Helvetica, Arial, sans-serif;
        font-weight: 900;
        font-size: 56px;
        color: #eab308;
        line-height: 1;
        letter-spacing: -1px;
      }
      .stat-label {
        font-family: Helvetica, Arial, sans-serif;
        font-weight: 600;
        font-size: 19px;
        color: #d1d5db;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 2px;
      }
      .divider {
        width: 100%;
        height: 1px;
        background: rgba(255,255,255,0.12);
        margin: 14px 0;
      }
      #bottom-label {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 17px;
        font-weight: 700;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"
      data-composition-id="awards-stat-card"
      data-start="0"
      data-duration="5"
      data-width="1080"
      data-height="1920">

      <div id="card-wrap" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="stat-card">
          <div class="stat-row" id="s1">
            <div class="stat-number">7</div>
            <div class="stat-label">Days only</div>
          </div>
          <div class="divider"></div>
          <div class="stat-row" id="s2">
            <div class="stat-number">2</div>
            <div class="stat-label">Cities · LA + NYC</div>
          </div>
          <div class="divider"></div>
          <div id="bottom-label">Academy Qualifying Run</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      gsap.set("#card-wrap", { opacity: 1 });
      gsap.set(["#s1","#s2","#bottom-label"], { opacity: 1 });
      tl.to("#card-wrap", { opacity: 0, duration: 0.1 }, 4.9);

      window.__timelines["awards-stat-card"] = tl;
      tl.seek(0);
    </script>
  </body>
</html>
