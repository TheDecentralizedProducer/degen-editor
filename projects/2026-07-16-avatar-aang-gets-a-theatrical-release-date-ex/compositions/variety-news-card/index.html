<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Variety News Card</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
      }
      #root {
        position: relative; width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
      }
      #card-wrap {
        position: absolute;
        left: 30px;
        top: 280px;
        width: 1020px;
      }
      #news-card {
        background: #0d0d0d;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,0.7);
        padding: 22px 28px 22px 28px;
        border-top: 4px solid #b91c1c;
      }
      #source-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      #source-name {
        font-family: Georgia, 'Times New Roman', serif;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 3px;
        color: #ffffff;
        text-transform: uppercase;
      }
      #date-tag {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 18px;
        color: #9ca3af;
        font-weight: 400;
      }
      #headline {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 28px;
        line-height: 1.4;
        color: #f1f1f1;
        font-weight: 700;
      }
      #sub {
        margin-top: 10px;
        font-family: Helvetica, Arial, sans-serif;
        font-size: 20px;
        color: #b91c1c;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root"
      data-composition-id="variety-news-card"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1920">

      <div id="card-wrap" class="clip" data-start="0" data-duration="6" data-track-index="1">
        <div id="news-card">
          <div id="source-row">
            <span id="source-name">Variety</span>
            <span id="date-tag">July 2026</span>
          </div>
          <div id="headline">'Avatar Aang: The Last Airbender' Set for Theatrical Run in L.A. and N.Y. for Awards Qualifying</div>
          <div id="sub">AMC Burbank · AMC Empire 25 · July 24–30</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Hard cut in
      gsap.set("#card-wrap", { opacity: 1 });

      // Hold then hard cut out
      tl.to("#card-wrap", { opacity: 0, duration: 0.1 }, 3.4);

      window.__timelines["variety-news-card"] = tl;
      tl.seek(0);
    </script>
  </body>
</html>
